    brand: "#2f6b73"
    brand_strong: "#1f535a"
    brand_soft: "#ddebea"
    border: "#ddd8ce"
    border_strong: "#c7c0b4"
    code_bg: "#1f2430"
    code_bg_alt: "#262c39"
    code_text: "#e8eef5"
    code_inline_bg: "#dbe9ea"
    code_inline_text: "#18484f"
    mermaid_bg: "#fffdfa"
    selection: "#dbeceb"
  dark:
