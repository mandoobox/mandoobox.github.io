default_mode: system
storage_key: mandoobox-theme

labels:
  home: Home
  theme: Theme
  light: Light
  dark: Dark
  all: 전체
  search: 검색
  search_placeholder: 제목, 카테고리, 태그, 내용으로 검색
  clear_search: 검색어 지우기
  category: 카테고리
  toc: 목차
  empty_posts: 조건에 맞는 게시물이 없습니다.

fonts:
  body: '"Pretendard", "SUIT", "Noto Sans KR", sans-serif'
  heading: '"Pretendard", "SUIT", "Noto Sans KR", sans-serif'
  code: '"JetBrains Mono", "Cascadia Code", "Fira Code", monospace'

layout:
  content_width: "920px"
  radius_large: "24px"
  radius_medium: "18px"
  radius_small: "12px"
  shadow_soft: "0 22px 60px rgba(15, 23, 42, 0.10)"
  shadow_strong: "0 30px 80px rgba(2, 6, 23, 0.18)"

palette:
